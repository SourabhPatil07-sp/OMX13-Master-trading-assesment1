services:
  db:
    image: postgres:15-alpine
    container_name: omnimarket_db
    environment:
      POSTGRES_USER: omnimarket
      POSTGRES_PASSWORD: omnimarket_password
      POSTGRES_DB: omnimarket
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnimarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend/api
    container_name: omnimarket_api

    environment:
      - DATABASE_URL=postgresql+asyncpg://omnimarket:omnimarket_password@db:5432/omnimarket

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - ./backend/api:/app

    restart: unless-stopped

  engine:
    build: ./backend/engine
    container_name: omnimarket_engine

    environment:
      - DATABASE_URL=postgresql://omnimarket:omnimarket_password@db:5432/omnimarket?sslmode=disable

    ports:
      - "8081:8080"

    depends_on:
      db:
        condition: service_healthy

    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: omnimarket_frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    restart: unless-stopped

volumes:
  pgdata: