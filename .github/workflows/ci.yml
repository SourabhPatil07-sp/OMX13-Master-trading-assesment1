name: CI-OMX13

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: frontend

      - name: Start Application
        run: docker compose up -d --build

      - name: Run migrations
        run: docker exec omnimarket_api alembic upgrade head

      - name: Seed database
        run: docker exec omnimarket_api python seed_db.py

      - name: Wait for Database
        run: |
          timeout 60 bash -c 'until docker exec omnimarket_db pg_isready -U omnimarket; do sleep 2; done'

      - name: Run Python Tests
        run: docker exec omnimarket_api pytest

      - name: Run Frontend Tests
        run: npm test --prefix frontend

      - name: Run Go Tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/backend/engine:/app \
            -w /app \
            golang:1.26-alpine \
            go test ./... -v

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build API Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/omnimarket-api:latest ./backend/api
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/omnimarket-api:latest

      - name: Build Engine Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/omnimarket-engine:latest ./backend/engine
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/omnimarket-engine:latest

      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/omnimarket-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/omnimarket-frontend:latest
