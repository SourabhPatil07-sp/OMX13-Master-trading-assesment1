name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      run: npm ci
      working-directory: frontend

    - name: Start services
      run: docker compose up -d --build

    - name: Wait for database
      run: timeout 60 bash -c 'until docker exec omnimarket_db pg_isready -U omnimarket; do sleep 2; done'

    - name: Seed database
      run: docker exec omnimarket_api python seed_db.py

    - name: Run tests
      run: |
        docker run --rm -v $(pwd)/backend/engine:/app -w /app --network omni-market_default golang:1.26-alpine go test ./... -v
        docker exec omnimarket_api pytest
        npm run test --prefix frontend

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: ./backend/api
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/omnimarket-api:latest

    - name: Build and push Engine image
      uses: docker/build-push-action@v5
      with:
        context: ./backend/engine
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/omnimarket-engine:latest

    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/omnimarket-frontend:latest
